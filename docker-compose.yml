# Local PostgreSQL + PostGIS (matches default DATABASE_URL in server/.env.example)
# From repo root: docker compose up -d
# Then run migrations, then: npm run seed -w server
#
# POSTGRES_DB is only applied on first data volume init. If this volume was created with another
# database name, create connectbc manually, e.g.:
#   docker compose exec db psql -U postgres -c "CREATE DATABASE connectbc TEMPLATE template_postgis;"

services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: connectbc
    volumes:
      - connectbc_pgdata:/var/lib/postgresql/data

volumes:
  connectbc_pgdata:
